# CI: the same three gates a session runs locally, in the same order.
# npm run verify includes the static invariant checker as its first stage,
# so a half-scaffolded example or a banned call fails the push, not the
# next session.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npm run check
      - name: tests
        run: npm test
      - name: invariants + verify suites
        run: npm run verify

  pack:
    # Guard the published tarball: the prebuilt Workshop UI (dist-workshop/) is a
    # separate build artifact, and an allowlist slip once dropped it silently so
    # installs served "no prebuilt Workshop UI". Build it, then ask npm what it
    # would pack and assert the entry is there — every push/PR, so it can't
    # regress unnoticed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: tarball contains prebuilt Workshop UI
        run: npm run pack:check
