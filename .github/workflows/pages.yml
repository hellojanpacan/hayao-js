name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments: queue them, never cancel one mid-flight. Canceling
# an in-progress run does NOT release the server-side Pages deployment lock, so a
# following deploy would hit "Deployment failed, try again later" (seen when two
# PRs merge seconds apart). `cancel-in-progress: false` makes the next run wait
# for the current one to finish — GitHub's recommended setting for Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # Custom domain (hayao.dev) serves from the root — no repo-path prefix.
      - run: npm run build
        env:
          BASE_PATH: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
